name: CI
on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  quality:
    # Pin Node via container image so npm ci always runs on >=22.22.1 (engine-strict).
    # Avoids setup-node / Actions runtime mismatches that caused EBADENGINE on GitHub.
    runs-on: ubuntu-latest
    container:
      image: node:22.22.1-bookworm
    defaults:
      run:
        shell: bash
    steps:
      # Use PR branch HEAD, not the merge commit with base — avoids lockfile/package.json drift.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Verify Node and install dependencies
        run: |
          set -euxo pipefail
          node -v
          npm -v
          test -f package-lock.json
          npm run check:engines
          npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Prettier
        run: npm run format:check
      - name: Migration prefix sanity
        run: npm run check:migrations
      - name: Migration order drift
        run: npm run check:migration-drift
      - name: ESLint
        run: npm run lint
      - name: Stylelint
        run: npm run lint:styles
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
