name: CI
on:
  push:
    branches: [main, staging]
  pull_request:

# GitHub Actions runners default action runtimes to Node 20 until June 2026.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Pin explicitly — package.json engines.node is >=22.22.1 and .npmrc sets engine-strict.
          node-version: '22.22.1'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Verify Node engine
        run: |
          node -v
          npm -v
          npm run check:engines
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Prettier
        run: npm run format:check
      - name: Migration prefix sanity
        run: npm run check:migrations
      - name: Migration order drift
        run: npm run check:migration-drift
      - name: ESLint
        run: npm run lint
      - name: Stylelint
        run: npm run lint:styles
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
